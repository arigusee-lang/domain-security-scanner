name: Deploy to GCE VM

on:
  push:
    branches: [main]

env:
  VM_USER: dn-sec
  VM_HOST: ${{ secrets.VM_HOST }}
  APP_DIR: /opt/dn-sec

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm test
      - run: npm run build

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to VM
        run: |
          ssh -i ~/.ssh/deploy_key $VM_USER@$VM_HOST << 'DEPLOY'
            set -e
            cd ${{ env.APP_DIR }}

            # Pull latest code
            git fetch origin main
            git reset --hard origin/main

            # Install dependencies and build
            npm ci --legacy-peer-deps
            npm run build

            # Restart the service
            sudo systemctl restart dn-sec

            echo "Deploy complete. Checking service status..."
            sleep 2
            sudo systemctl is-active dn-sec
          DEPLOY

      - name: Health check
        run: |
          sleep 5
          curl -sf https://dn-sec.com/ > /dev/null && echo "Health check passed" || echo "Health check failed"
